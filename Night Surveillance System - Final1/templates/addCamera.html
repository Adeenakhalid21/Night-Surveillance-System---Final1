<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Night Shield | Dashboard</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@48,400,0,0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard-style.css')}}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/addcamera-style.css')}}">
</head>
<body>
   <div class="container top-nav-layout">
      {% include 'partials/top_nav.html' %}
      <div class="content-grid with-right">

      <main>
           <h1>Add Camera</h1>

           <div class="date">
             <input type="date" >
           </div>

 
       <div class="add-camera">
        <!-- <h2>Add Camera</h2> -->
        <div class="camera-container">
          <div class="item left">
            <div class="icon" id="camera-1">
              <span class="material-symbols-sharp">No Video</span>
            </div>
          </div>
          <div class="item right">
            <div class="icon" id="camera-2">
              <span class="material-symbols-sharp">No Video</span>
            </div>
          </div>
        </div>
        <form action="{{ url_for('cam') }}" method="POST">
          <div class="camera-form" id="camera-form-1">
            <label for="camera-name">Camera Name:</label>
            <input type="text" name="camname" id="camera-name" />
            <label for="camera-url">Camera URL:</label>
            <input type="text" name="camurl" id="camera-url" />
            <label for="camera-resolution">Camera Resolution:</label>
            <select id="camera-resolution">
              <option value="1280x720">1280x720</option>
              <option value="1920x1080">1920x1080</option>
              <option value="2560x1440">2560x1440</option>
            </select>
            <label for="camera-fps">Camera FPS (0-60):</label>
            <input type="number" name="camfps" id="camera-fps" min="0" max="60" step="1" oninput="validateCameraFPS(this)" />
            <button type="submit" id="addCameraBtn">Add Camera</button>
          </div>
        </form>
        <form action="{{ url_for('cam') }}" method="POST">
          <div class="camera-form" id="camera-form-2">
            <label for="camera-name">Camera Name:</label>
            <input type="text" name="camname" id="camera-name" />
            <label for="camera-url">Camera URL:</label>
            <input type="text" name="camurl" id="camera-url" />
            <label for="camera-resolution">Camera Resolution:</label>
            <select id="camera-resolution">
              <option value="1280x720">1280x720</option>
              <option value="1920x1080">1920x1080</option>
              <option value="2560x1440">2560x1440</option>
            </select>
            <label for="camera-fps">Camera FPS (0-60):</label>
            <input type="number" name="camfps" id="camera-fps" min="0" max="60" step="1" oninput="validateCameraFPS(this)" />
            <button type="button" id="addCameraBtn">Add Camera</button>
          </div>
        </form>
      </div>
      

      </main>
      <!------------------
         end main
        ------------------->

      <!----------------
        start right main 
      ---------------------->
    <div class="right">

        <div class="insights">

           <!-- start seling -->
            <div class="sales">
               <span class="material-symbols-sharp">camera</span>
               <div class="middle">

                 <div class="left">
                   <h3>Live Monitoring</h3>
                   <h1>Active:1</h1>
                 </div>
                  <div class="progress">
                      <svg>
                         <circle  r="30" cy="40" cx="40"></circle>
                      </svg>
                      <div class="number"><p>80%</p></div> 
                      <!-- represent the coverage percentage of surveillance area -->
                  </div>

               </div>
               <small>Last 24 Hours</small>
            </div>
            
           <!-- end seling -->

        </div>
         <!-- end insights -->


    
     
    </div>

    </div>
  </div>

     <!-- Footer -->
   <footer>
    <p>&copy; <span id="year"></span> Night Shield. All rights reserved.</p>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</footer>


   <script src="{{ url_for('static', filename='js/dashboard-script.js')}}"></script>
</body>
</html>
